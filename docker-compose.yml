version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bolao_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGTZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bolao_backend
    restart: unless-stopped
    ports:
      # Expõe apenas para localhost (seguro, a internet não acessa diretamente)
      - "127.0.0.1:3998:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ENABLE_ADMIN_BOOTSTRAP=${ENABLE_ADMIN_BOOTSTRAP:-false}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - ADMIN_BOOTSTRAP_USERNAME=${ADMIN_BOOTSTRAP_USERNAME}
      - ADMIN_BOOTSTRAP_EMAIL=${ADMIN_BOOTSTRAP_EMAIL}
      - ADMIN_BOOTSTRAP_PASSWORD=${ADMIN_BOOTSTRAP_PASSWORD}
      - TEAMS_JSON_URL=${TEAMS_JSON_URL}
      - STADIUMS_JSON_URL=${STADIUMS_JSON_URL}
      - MATCHES_JSON_URL=${MATCHES_JSON_URL}
      - OPENFOOTBALL_DAILY_SYNC_ENABLED=${OPENFOOTBALL_DAILY_SYNC_ENABLED:-false}
      - TZ=America/Sao_Paulo
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_STARTTLS=${SMTP_STARTTLS}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_DOMAIN=${FROM_DOMAIN}
      - SMTP_FROM=${SMTP_FROM}
      - FRONTEND_URL=https://copa2026.bru.to
      - ADMIN_REGISTRATION_NOTIFY_ENABLED=${ADMIN_REGISTRATION_NOTIFY_ENABLED:-true}
      - ADMIN_REGISTRATION_NOTIFY_TO=${ADMIN_REGISTRATION_NOTIFY_TO:-}
      - PAYMENT_APPROVAL_NOTIFY_ENABLED=${PAYMENT_APPROVAL_NOTIFY_ENABLED:-false}
      - PAYMENT_APPROVAL_NOTIFY_URL=${PAYMENT_APPROVAL_NOTIFY_URL}
      - PAYMENT_APPROVAL_NOTIFY_TOKEN=${PAYMENT_APPROVAL_NOTIFY_TOKEN}
      - PAYMENT_APPROVAL_NOTIFY_TO=${PAYMENT_APPROVAL_NOTIFY_TO}
      - PAYMENT_APPROVAL_NOTIFY_SEND_AS=${PAYMENT_APPROVAL_NOTIFY_SEND_AS:-text}
      - PAYMENT_APPROVAL_NOTIFY_TIMEOUT_SECONDS=${PAYMENT_APPROVAL_NOTIFY_TIMEOUT_SECONDS:-5}
      - WHATSAPP_NOTIFY_ENABLED=${WHATSAPP_NOTIFY_ENABLED:-false}
      - WHATSAPP_NOTIFY_URL=${WHATSAPP_NOTIFY_URL}
      - WHATSAPP_NOTIFY_TOKEN=${WHATSAPP_NOTIFY_TOKEN}
      - WHATSAPP_NOTIFY_TO=${WHATSAPP_NOTIFY_TO}
      - WHATSAPP_NOTIFY_SEND_AS=${WHATSAPP_NOTIFY_SEND_AS:-text}
      - WHATSAPP_NOTIFY_TIMEOUT_SECONDS=${WHATSAPP_NOTIFY_TIMEOUT_SECONDS:-5}
      - WHATSAPP_GROUP_CHAT=${WHATSAPP_GROUP_CHAT}
      - FOOTBALL_DATA_ENABLED=${FOOTBALL_DATA_ENABLED:-true}
      - FOOTBALL_DATA_API=${FOOTBALL_DATA_API}
      - FOOTBALL_DATA_COMPETITION=${FOOTBALL_DATA_COMPETITION-WC}
      - FOOTBALL_DATA_TIMEOUT_SECONDS=${FOOTBALL_DATA_TIMEOUT_SECONDS:-10}
      - FOOTBALL_DATA_MAX_REQUESTS_PER_RUN=${FOOTBALL_DATA_MAX_REQUESTS_PER_RUN:-8}
      - GITHUB_AUDIT=${GITHUB_AUDIT:-false}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    networks:
      - internal_net
      - mailnet      # Apenas backend se conecta à rede de e-mails

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bolao_frontend
    restart: unless-stopped
    ports:
      # Expõe apenas para localhost (seguro, a internet não acessa diretamente)
      - "127.0.0.1:3999:3000"
    environment:
      - VITE_API_URL=/
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - internal_net

volumes:
  postgres_data:

networks:
  internal_net:
    driver: bridge
  mailnet:
    external: true
    name: megasena_default
