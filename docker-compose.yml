version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bolao_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGTZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      mailnet:
        ipv4_address: 172.25.0.11

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bolao_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - ADMIN_BOOTSTRAP_USERNAME=${ADMIN_BOOTSTRAP_USERNAME}
      - ADMIN_BOOTSTRAP_EMAIL=${ADMIN_BOOTSTRAP_EMAIL}
      - ADMIN_BOOTSTRAP_PASSWORD=${ADMIN_BOOTSTRAP_PASSWORD}
      - TEAMS_JSON_URL=${TEAMS_JSON_URL}
      - STADIUMS_JSON_URL=${STADIUMS_JSON_URL}
      - MATCHES_JSON_URL=${MATCHES_JSON_URL}
      - TZ=America/Sao_Paulo
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_STARTTLS=${SMTP_STARTTLS}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_DOMAIN=${FROM_DOMAIN}
      - SMTP_FROM=${SMTP_FROM}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - db
    volumes:
      - ./backend:/app
    networks:
      mailnet:
        ipv4_address: 172.25.0.12

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bolao_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      mailnet:
        ipv4_address: 172.25.0.13

volumes:
  postgres_data:

networks:
  mailnet:
    external: true
    name: megasena_default
